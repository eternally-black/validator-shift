# ----------------------------------------------------------------------------
# ValidatorShift — local / self-hosted stack
# ----------------------------------------------------------------------------
# Ports (bound to 127.0.0.1 by default — front via reverse proxy / TLS for
# external access; export them on 0.0.0.0 only when you intentionally want
# the hub reachable from off-host):
#   3001 — Hub HTTP API (Fastify)
#   3002 — Hub WebSocket relay
#   3000 — Web UI (Next.js standalone)
# ----------------------------------------------------------------------------

services:
  hub:
    build:
      context: .
      dockerfile: Dockerfile.hub
    image: validator-shift/hub:local
    container_name: validator-shift-hub
    ports:
      # Single port: hub serves HTTP API + WebSocket on the same listener.
      - "127.0.0.1:3001:3001"
    volumes:
      # Named volume keeps uid/gid in sync with the in-image nodejs user (1001).
      - hub-data:/app/data
    environment:
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - validator-shift
    # Lightweight TCP probe — no /health endpoint required. Node is already
    # in the image so we use it instead of installing nc/wget for the check.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('net').createConnection(3001,'127.0.0.1').on('connect',function(){this.end();process.exit(0)}).on('error',function(){process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: validator-shift/web:local
    container_name: validator-shift-web
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      # Browser-facing hub origin (HTTP + WS on same port).
      # Override for production, e.g. https://hub.your-domain.com
      NEXT_PUBLIC_HUB_URL: http://localhost:3001
      # Server-side URL used by Next.js RSC fetchers (docker network).
      HUB_URL: http://hub:3001
    depends_on:
      hub:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - validator-shift
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      # Next.js writes ISR cache + image-optimisation artefacts to /app/.next/cache.
      - /tmp
      - /app/packages/web/.next/cache
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

volumes:
  hub-data:
    name: validator-shift-hub-data

networks:
  validator-shift:
    name: validator-shift
    driver: bridge
