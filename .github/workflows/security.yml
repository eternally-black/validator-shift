name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Dependency and static analysis scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python (for semgrep)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install workspace dependencies
        run: npm ci --ignore-scripts

      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high

      - name: Install actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Run actionlint
        run: actionlint -color

      - name: Install semgrep
        run: python -m pip install --upgrade semgrep

      - name: Run semgrep
        continue-on-error: true
        run: |
          semgrep \
            --config=p/typescript \
            --config=p/owasp-top-ten \
            --config=p/javascript \
            --config=p/nodejsscan \
            --sarif \
            --output=semgrep.sarif \
            --error \
            . || true

      - name: Upload semgrep SARIF to GitHub code scanning
        if: always() && hashFiles('semgrep.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Install osv-scanner
        run: |
          curl -sSfL "https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64" \
            -o osv-scanner
          chmod +x osv-scanner

      - name: Run osv-scanner
        run: ./osv-scanner --recursive --skip-git ./
